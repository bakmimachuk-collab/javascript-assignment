<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIJOS FAQ</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f3f3f3;
}

/* Header */
header{
    background:white;
    height:120px;
    display:flex;
    align-items:center;
    padding-left:100px;
}

.logo{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo img{
    width:60px;
}

.logo h1{
    color:#b49b33;
    font-size:32px;
    font-weight:bold;
}

/* Main Section */
.hero{
    text-align:center;
    padding-top:60px;
    min-height:500px;
}

.hero h2{
    font-size:55px;
    font-weight:bold;
    color:#222;
    margin-bottom:40px;
}

.search-box{
    width:60%;
    height:45px;
    margin:auto;
    background:white;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.search-box input{
    width:100%;
    height:100%;
    border:none;
    outline:none;
    padding:15px;
    border-radius:8px;
    font-size:16px;
}

/* Footer */
footer{
    background:#05070d;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 100px;
    position:fixed;
    bottom:0;
    width:100%;
}

footer a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

footer span{
    color:orange;
}
</style>

</head>
<body>

<header>
    <div class="logo">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/c/c8/University_of_Jos_logo.svg/1200px-University_of_Jos_logo.svg.png" alt="logo">
        <h1>UNIVERSITY OF JOS</h1>
    </div>
</header>

<section class="hero">
    <h2>Frequently Asked Questions</h2>

    <div class="search-box">
        <input type="text" placeholder="">
    </div>
</section>

<footer>
    <p>
        Copyright ©2026 <span>University Of Jos</span>. All Rights Reserved
    </p>

    <div>
        <a href="#">FAQ</a> |
        <a href="#">Support</a>
    </div>
</footer>

</body>
</html>
