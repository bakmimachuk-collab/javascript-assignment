<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIJOS - Sundry and Other Income Charges</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .table-row:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Top Header -->
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="https://portal.unijos.edu.ng/images/logo.png" alt="UNIJOS Logo" class="h-12" 
                     onerror="this.src='https://via.placeholder.com/48x48/001f3f/fff?text=UJ';">
                <div>
                    <span class="text-xl font-bold text-blue-900">UNIVERSITY OF JOS</span>
                </div>
            </div>
            <button class="lg:hidden text-2xl"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <div class="flex max-w-7xl mx-auto">
        <!-- Left Sidebar -->
        <div class="w-64 bg-white border-r h-screen p-4 hidden lg:block">
            <div class="space-y-1">
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-blue-600 bg-blue-50 rounded-lg font-medium">
                    <i class="fas fa-gift"></i>
                    SOUVENIR
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 rounded-lg">
                    <i class="fas fa-shopping-bag"></i>
                    MY ORDERS
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-6">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-semibold text-gray-800">
                    Sundry and Other Income Charges / University's Market Place
                </h1>
                <button onclick="goHome()" 
                        class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700">
                    Home
                </button>
            </div>

            <!-- Payment Category Filter -->
            <div class="bg-white p-5 rounded-xl shadow-sm mb-6 flex gap-4 items-end">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Payment Category</label>
                    <select id="category" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500">
                        <option value="">Select Category</option>
                        <option value="all">All Items</option>
                        <option value="souvenir">Souvenirs</option>
                    </select>
                </div>
                <button onclick="getRecords()" 
                        class="bg-blue-600 text-white px-8 py-3 rounded-lg hover:bg-blue-700 font-medium">
                    Get Record
                </button>
            </div>

            <!-- Table Controls -->
            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <div class="p-4 border-b flex flex-wrap items-center gap-3">
                    <div class="flex items-center gap-2">
                        <span class="text-sm">Show</span>
                        <select class="border rounded px-3 py-1">
                            <option>10</option>
                            <option>25</option>
                            <option>50</option>
                        </select>
                        <span class="text-sm">entries</span>
                    </div>
                    <div class="flex-1 max-w-xs">
                        <input type="text" id="search" placeholder="Search products..." 
                               onkeyup="searchTable()" 
                               class="w-full border rounded-lg px-4 py-2 focus:outline-none">
                    </div>
                    <div class="flex gap-2 ml-auto">
                        <button class="px-4 py-2 text-sm border rounded hover:bg-gray-50">Copy</button>
                        <button class="px-4 py-2 text-sm border rounded hover:bg-gray-50">CSV</button>
                        <button class="px-4 py-2 text-sm border rounded hover:bg-gray-50">Excel</button>
                        <button class="px-4 py-2 text-sm border rounded hover:bg-gray-50">PDF</button>
                        <button class="px-4 py-2 text-sm border rounded hover:bg-gray-50">Print</button>
                    </div>
                </div>

                <!-- Products Table -->
                <div class="overflow-x-auto">
                    <table class="w-full" id="productsTable">
                        <thead class="bg-gray-100">
                            <tr>
                                <th class="px-6 py-4 text-left">S/N</th>
                                <th class="px-6 py-4 text-left">Product Name</th>
                                <th class="px-6 py-4 text-right">Price (₦)</th>
                                <th class="px-6 py-4 text-center">Qty</th>
                                <th class="px-6 py-4 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y">
                            <tr class="table-row">
                                <td class="px-6 py-4">1</td>
                                <td class="px-6 py-4 font-medium">TEA/ COFFEE MUGS</td>
                                <td class="px-6 py-4 text-right">1,000</td>
                                <td class="px-6 py-4 text-center">139</td>
                                <td class="px-6 py-4 text-center">
                                    <button onclick="addToCart(1, 'TEA/ COFFEE MUGS', 1000)" 
                                            class="text-blue-600 hover:text-blue-700 font-medium">
                                        <i class="fas fa-plus"></i> Add to Cart
                                    </button>
                                </td>
                            </tr>
                            <tr class="table-row">
                                <td class="px-6 py-4">2</td>
                                <td class="px-6 py-4 font-medium">JOTTER (HARD COVER)</td>
                                <td class="px-6 py-4 text-right">1,000</td>
                                <td class="px-6 py-4 text-center">88</td>
                                <td class="px-6 py-4 text-center">
                                    <button onclick="addToCart(2, 'JOTTER (HARD COVER)', 1000)" 
                                            class="text-blue-600 hover:text-blue-700 font-medium">
                                        <i class="fas fa-plus"></i> Add to Cart
                                    </button>
                                </td>
                            </tr>
                            <!-- Add more rows as needed -->
                            <tr class="table-row">
                                <td class="px-6 py-4">3</td>
                                <td class="px-6 py-4 font-medium">JOTTER (MEDIUM)</td>
                                <td class="px-6 py-4 text-right">600</td>
                                <td class="px-6 py-4 text-center">88</td>
                                <td class="px-6 py-4 text-center">
                                    <button onclick="addToCart(3, 'JOTTER (MEDIUM)', 600)" 
                                            class="text-blue-600 hover:text-blue-700 font-medium">
                                        <i class="fas fa-plus"></i> Add to Cart
                                    </button>
                                </td>
                            </tr>
                            <tr class="table-row">
                                <td class="px-6 py-4">4</td>
                                <td class="px-6 py-4 font-medium">PUFF PILLOW (FABRIC)</td>
                                <td class="px-6 py-4 text-right">4,000</td>
                                <td class="px-6 py-4 text-center">50</td>
                                <td class="px-6 py-4 text-center">
                                    <button onclick="addToCart(4, 'PUFF PILLOW (FABRIC)', 4000)" 
                                            class="text-blue-600 hover:text-blue-700 font-medium">
                                        <i class="fas fa-plus"></i> Add to Cart
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Right Sidebar - Cart -->
        <div class="w-80 bg-white border-l p-6 hidden lg:block">
            <h2 class="text-lg font-semibold mb-4">Cart Summary</h2>
            <div id="cart" class="bg-gray-50 rounded-xl p-5 min-h-[400px]">
                <div id="cart-items" class="space-y-4"></div>
                <div id="empty-cart" class="text-center text-gray-500 py-12">
                    <i class="fas fa-shopping-cart text-4xl mb-3"></i>
                    <p class="font-medium">No Cart Item</p>
                </div>
            </div>
            
            <button onclick="checkout()" 
                    class="w-full mt-6 bg-green-600 text-white py-4 rounded-xl font-semibold hover:bg-green-700">
                PROCEED TO PAYMENT
            </button>
        </div>
    </div>

    <script>
        let cart = [];

        function addToCart(id, name, price) {
            cart.push({ id, name, price, qty: 1 });
            renderCart();
            alert(`${name} added to cart!`);
        }

        function renderCart() {
            const cartItems = document.getElementById('cart-items');
            const emptyCart = document.getElementById('empty-cart');
            
            if (cart.length === 0) {
                emptyCart.style.display = 'block';
                cartItems.innerHTML = '';
                return;
            }
            
            emptyCart.style.display = 'none';
            cartItems.innerHTML = cart.map(item => `
                <div class="flex justify-between items-center bg-white p-3 rounded-lg shadow-sm">
                    <div>
                        <p class="font-medium text-sm">${item.name}</p>
                        <p class="text-xs text-gray-500">₦${item.price.toLocaleString()} × ${item.qty}</p>
                    </div>
                    <button onclick="removeFromCart(${item.id})" class="text-red-500 text-xl">×</button>
                </div>
            `).join('');
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            renderCart();
        }

        function getRecords() {
            alert("Records loaded successfully! (Demo)");
        }

        function searchTable() {
            // Simple search functionality
            const filter = document.getElementById('search').value.toUpperCase();
            const rows = document.querySelectorAll('#productsTable tbody tr');
            
            rows.forEach(row => {
                const text = row.textContent.toUpperCase();
                row.style.display = text.includes(filter) ? '' : 'none';
            });
        }

        function checkout() {
            if (cart.length === 0) {
                alert("Your cart is empty!");
            } else {
                alert("Redirecting to payment gateway... (This is a demo clone)");
            }
        }

        function goHome() {
            alert("Going back to dashboard... (Demo)");
        }
    </script>
</body>
</html>
