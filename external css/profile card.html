<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="my profile card style.css">
</head>
<body>

    <div class="card">
        <div class="header"></div>

        <img src="muleng.jpg" alt="Profile Picture" class="profile-img">

        <div class="content">
            <h2>Bakmi Machuk</h2>
            <p class="job">Frontend Developer</p>

            <p class="bio">
                Passionate web developer who loves building beautiful and responsive websites.
            </p>

            <div class="stats">
                <div>
                    <h3>120</h3>
                    <span>Posts</span>
                </div>

                <div>
                    <h3>2.5K</h3>
                    <span>Followers</span>
                </div>

                <div>
                    <h3>300</h3>
                    <span>Following</span>
                </div>
            </div>
           <div class="but">
              <button class="button">Follow</button>
        
              <a href="send a message.html"><button  class="button">Message</button></a>
          </div>
    </div>

</body>
</html>
